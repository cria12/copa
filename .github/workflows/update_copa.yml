name: Atualização Copa 2026

on:
  schedule:
    - cron: '0 */5 * * *' # Executa a cada 5 horas
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

permissions:
  contents: write # Permite que o GitHub Actions faça push no repositório

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Executar Script de Atualização
        run: |
          python update_from_api.py

      - name: Commit e Push das Alterações
        run: |
          git config --global user.name "Copa Bot"
          git config --global user.email "copabot@example.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "git commit update" && git push origin main)
